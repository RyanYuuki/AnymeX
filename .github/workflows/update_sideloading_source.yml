name: Update Sideloading Source

on:
  workflow_run:
    workflows:
      - "changelog"
    types:
      - completed
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to update when running manually"
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  update-source:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || 'main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update sideloading source
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python repo/update_source.py

      - name: Commit and push changes
        run: |
          SOURCE_FILE=$(python -c "import json; print(json.load(open('repo/config.json'))['json_file'])")
          git config --local user.email "github-actions@users.noreply.github.com"
          git config --local user.name "github-actions"
          git add "$SOURCE_FILE"
          git diff --staged --quiet || git commit -m "chore: update sideloading source"
          git push origin HEAD:"$TARGET_BRANCH"
